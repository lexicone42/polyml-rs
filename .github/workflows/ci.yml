name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# The headline HOL4 / Isabelle demos need warm /tmp checkpoints that take
# tens of minutes to build, so they are NOT run here — see docs/REPRODUCING.md
# (tools/regression.sh full is the local gate for those). This workflow is:
#   check           — formatting, lints, full workspace build, all data-free
#                     tests (runtime/JIT/image units + integration + the
#                     malicious-image corpus), and the deref-surface lint.
#   bootstrap-smoke — obtains upstream Poly/ML pinned at the last-validated
#                     SHA and actually RUNS the stage-0 bootstrap image
#                     (asserting the byte-identical step count), which also
#                     un-skips the vendor-gated test suites (cli_run,
#                     golden_sml, untrusted byte-identity, the GC-UAF fence).
#   interp-only     — the no-default-features (Cranelift-free) gate.
# The 7-stage self-bootstrap + cross-target checks run in nightly.yml.

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned toolchain (rust-toolchain.toml)
        run: rustup show

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      # Blocking: the tree is kept rustfmt-clean (run `cargo fmt --all` before committing).
      - name: Formatting
        run: cargo fmt --all -- --check

      - name: Build workspace (compiles all crates + test targets)
        run: cargo build --release --workspace --all-targets

      - name: Clippy
        run: cargo clippy --release --workspace --all-targets

      - name: Runtime unit tests (data-free)
        run: cargo test --release -p polyml-runtime --lib

      - name: Runtime integration tests (data-free; vendor-gated ones self-skip)
        run: cargo test --release -p polyml-runtime --tests

      - name: JIT tests (data-free)
        run: cargo test --release -p polyml-jit

      - name: Image-format tests
        run: cargo test --release -p polyml-image

      # Default-feature (JIT-enabled) polyml-bin tests: most skip without
      # vendor data, but the malicious-image --untrusted corpus runs here in
      # the shipped configuration (interp-only re-runs it without Cranelift).
      - name: CLI + untrusted-corpus tests (default features)
        run: cargo test --release -p polyml-bin

      # The --untrusted deref-surface completeness lint: any new
      # image-controlled-operand deref that isn't behind the untrusted gate
      # fails CI instead of shipping.
      - name: Deref-surface lint
        run: python3 tools/lint-image-deref.py

  # Runs the stage-0 bootstrap image for real. vendor/polyml is git-ignored,
  # so CI obtains it directly from upstream, PINNED to the last-validated
  # commit (docs/REPRODUCING.md) — a blobless sparse clone keeps it to a few MB.
  bootstrap-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned toolchain (rust-toolchain.toml)
        run: rustup show

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: Obtain upstream Poly/ML (pinned, blobless sparse clone)
        run: |
          git clone --filter=blob:none --no-checkout \
            https://github.com/polyml/polyml vendor/polyml
          git -C vendor/polyml sparse-checkout set bootstrap
          git -C vendor/polyml checkout c27c2953efe79189ad9d92f736d64e14cf90f078

      - name: Build poly (release)
        run: cargo build --release -p polyml-bin

      - name: Stage-0 bootstrap runs byte-identically (1,110,805 steps → Tagged(0))
        run: |
          out=$(./target/release/poly run vendor/polyml/bootstrap/bootstrap64.txt)
          echo "$out"
          echo "$out" | grep -q "Executed 1110805 bytecode step(s)"
          echo "$out" | grep -q "Result: Tagged(0)"

      - name: Same image under --untrusted (safe mode, byte-identical)
        run: |
          out=$(./target/release/poly run --untrusted vendor/polyml/bootstrap/bootstrap64.txt)
          echo "$out"
          echo "$out" | grep -q "Executed 1110805 bytecode step(s)"

      - name: Vendor-gated suites (cli_run, golden_sml, GC-UAF fence, …)
        run: |
          cargo test --release -p polyml-bin
          cargo test --release -p polyml-runtime --tests

  # Interpreter-only gate: `poly` built with `--no-default-features` drops the
  # Cranelift JIT (polyml-jit) from the dependency tree entirely. This is the
  # smaller, faster-compiling build that also unblocks big-endian cross targets
  # (s390x/ppc64) where Cranelift's build script is the blocker. We keep it
  # green so the JIT stays genuinely optional.
  interp-only:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned toolchain (rust-toolchain.toml)
        run: rustup show

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: Formatting (interp-only feature set)
        run: cargo fmt -p polyml-bin -- --check

      - name: Build poly (interpreter-only, no Cranelift)
        run: cargo build --release -p polyml-bin --no-default-features

      - name: Prove the dep tree is Cranelift-free
        run: |
          n=$(cargo tree -p polyml-bin --no-default-features | grep -c cranelift || true)
          echo "cranelift crates in interp-only tree: $n"
          test "$n" -eq 0

      - name: Clippy (interpreter-only)
        run: cargo clippy --release -p polyml-bin --no-default-features --all-targets

      - name: Tests (interpreter-only, data-free)
        run: cargo test --release -p polyml-bin --no-default-features
